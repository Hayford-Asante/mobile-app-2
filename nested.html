<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Document</title>
<style>
*{padding: 0%;
  margin: 0%;
}

html, body {
  width: 100%;
  height: 100%;
  -webkit-text-size-adjust: 100%;
}

            
    nav li
              {color:white;
               font-size: 15px;
               margin: 26px;
               display: inline-block;
               list-style: none; 
        }         
  nav a 
        {color:white;
        text-decoration: none;
         }   
                
 nav
       {width: 100%;
        height: 60px;
       background-color: darkblue;
        text-align: center;
          }

ul li:hover .dropdown { display: block;
            }

    ul 
         {margin: 0;
            padding: 0;
            list-style: none;
            background-color: darkblue;
            text-align: center;
         }

        

ul li{ position: relative;
        display: inline-block;
      }            

ul li ul.dropdown { display: none;
            position: absolute;
            background-color: lightgray;
            min-width: 160px;
            z-index: 999;
            top: 100%;
            left: 0;
            margin-top: 0;
}

ul li:hover ul.dropdown { display: block;
            }  


ul li ul.dropdown li:hover { background-color: gray;
            }

@media screen and (max-width: 768px){
  body {
    width: 100vw;
    overflow-x: hidden;
  }
}

</style>    
</head>
<body>
    <nav>
 <ul>
    
    <li><a href="#">About</a></li>
    <li><a href="#">Services</a></li>
    <li><a href="#">Contact</a>
     <ul class="dropdown">
        <li><a href="#">Email</a></li>
        <li><a href="#">Phone</a></li>
        <li><a href="#">Address</a></li>
    </ul>
    </li>
 </ul>  
    </nav> 
</body>
</html>
